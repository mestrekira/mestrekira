<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redefinir senha | Mestre Kira</title>

  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/ui-feedback.css" />
  <link rel="stylesheet" href="css/auth-recovery.css" />
  <link rel="icon" href="logo1.png" type="image/png" />
</head>
<body>
  <main class="auth-page">
    <section class="auth-card" aria-labelledby="pageTitle">
      <div class="auth-card__header">
        <h1 id="pageTitle">Redefinir senha</h1>
        <p id="hint" class="auth-card__subtitle">
          Abra esta página pelo link enviado ao seu e-mail e defina uma nova senha para acessar a plataforma.
        </p>
      </div>

      <form id="resetForm" class="auth-form" novalidate>
        <div class="auth-field">
          <label for="newPassword">Nova senha</label>
          <input
            type="password"
            id="newPassword"
            placeholder="Nova senha (mín. 8 caracteres)"
            autocomplete="new-password"
            required
          />
        </div>

        <div class="auth-field">
          <label for="confirmPassword">Confirmar nova senha</label>
          <input
            type="password"
            id="confirmPassword"
            placeholder="Confirme a nova senha"
            autocomplete="new-password"
            required
          />
        </div>

        <button id="resetBtn" class="auth-btn" type="submit">
          Salvar nova senha
        </button>

        <p id="status" class="auth-status" aria-live="polite"></p>
      </form>

      <div class="auth-links">
        <a href="login-professor.html">Ir para login de professor</a>
        <a href="login-aluno.html">Ir para login de aluno</a>
        <a href="login-escola.html">Ir para login da escola</a>
      </div>
    </section>
  </main>

  <script type="module" src="js/reset-password.js"></script>
  <script src="js/footer.js"></script>
</body>
</html>
