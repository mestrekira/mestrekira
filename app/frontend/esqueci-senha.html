<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recuperar senha | Mestre Kira</title>

  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/ui-feedback.css" />
  <link rel="stylesheet" href="css/auth-recovery.css" />
  <link rel="icon" href="logo1.png" type="image/png" />
</head>
<body>
  <main class="auth-page">
    <section class="auth-card" aria-labelledby="pageTitle">
      <div class="auth-card__header">
        <h1 id="pageTitle">Recuperar senha</h1>
        <p class="auth-card__subtitle">
          Digite seu e-mail. Se ele existir na plataforma, enviaremos um link para redefinir sua senha.
        </p>
      </div>

      <form id="recoverForm" class="auth-form" novalidate>
        <div class="auth-field">
          <label for="email">E-mail</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="Digite seu e-mail"
            autocomplete="email"
            inputmode="email"
            required
          />
        </div>

        <button id="sendBtn" class="auth-btn" type="submit">
          Enviar link
        </button>

        <p id="status" class="auth-status" aria-live="polite"></p>
      </form>

      <div class="auth-links">
        <a href="login-aluno.html">Voltar ao login do aluno</a>
        <a href="login-professor.html">Voltar ao login do professor</a>
      </div>
    </section>
  </main>

  <script type="module" src="js/esqueci-senha.js"></script>
  <script src="js/footer.js"></script>
</body>
</html>
